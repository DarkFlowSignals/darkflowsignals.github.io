<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="0.25" cy="0.25" r="0.9">
      <stop offset="0%" stop-color="#18182A"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feFlood flood-color="#00E676" flood-opacity="0.85"/>
      <feComposite in2="b" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-white" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feFlood flood-color="#F4F4FA" flood-opacity="0.55"/>
      <feComposite in2="b" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>
  <g font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-weight="900" font-size="42" letter-spacing="-2" text-anchor="middle">
    <text x="32" y="46" filter="url(#glow-white)" fill="transparent">
      <tspan fill="#F4F4FA">D</tspan><tspan fill="#00E676" filter="url(#glow-green)">F</tspan>
    </text>
    <text x="32" y="46">
      <tspan fill="#F4F4FA">D</tspan><tspan fill="#00E676">F</tspan>
    </text>
  </g>
</svg>
