<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1C1C2E"/>
      <stop offset="100%" stop-color="#05050A"/>
    </linearGradient>
    <linearGradient id="d-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B4B4C3"/>
    </linearGradient>
    <linearGradient id="f-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#28FF8C"/>
      <stop offset="100%" stop-color="#00B45A"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.7" cy="0.6" r="0.55">
      <stop offset="0%"  stop-color="#00E676" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00E676" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feFlood flood-color="#00E676" flood-opacity="0.9"/>
      <feComposite in2="b" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.1" in="SourceAlpha"/>
      <feOffset dx="0" dy="0.7"/>
      <feFlood flood-color="#000" flood-opacity="0.7"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="13" fill="url(#bg-grad)"/>
  <rect width="64" height="64" rx="13" fill="url(#halo)"/>
  <g font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-weight="900" font-size="44" letter-spacing="-3.2" text-anchor="middle" filter="url(#drop)">
    <text x="32" y="46">
      <tspan fill="url(#d-grad)">D</tspan><tspan fill="url(#f-grad)" filter="url(#glow-green)">F</tspan>
    </text>
  </g>
</svg>
